name: Supabase Keep-Alive

on:
  schedule:
    # Roda a cada 3 dias (às 12:00 UTC) - suficiente para evitar a pausa de 7 dias do Supabase
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        env:
          # Usando os mesmos secrets públicos do deploy para manter o app vivo
          VITE_SUPABASE_URL: "https://jmtavlozxkmkeubekbjd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdGF2bG96eGtta2V1YmVrYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzcwMzAsImV4cCI6MjA5Nzc1MzAzMH0.HW6-OjuevWDfnR2C5aJHthKpH0jBfx7R7vU_R3pznM8"
        run: node scripts/keep-alive.js
